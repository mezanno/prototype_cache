name: asset-store-postgres-dev

services:
  postgres:
    image: postgres:16
    container_name: asset-store-postgres
    environment:
      # DEV-ONLY credentials; never used outside local development.
      POSTGRES_USER: asset
      POSTGRES_PASSWORD: asset
      POSTGRES_DB: asset_store
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asset -d asset_store"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
