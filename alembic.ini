# Alembic configuration for the asset-store Postgres registry schema (B-009).
#
# The database URL is intentionally NOT set here. `migrations/env.py` reads the
# connection string from the ASSET_STORE_PG_DSN environment variable so the same
# DSN drives the app, the tests, and migrations. Run migrations with:
#
#   ASSET_STORE_PG_DSN=postgresql://... uv run alembic upgrade head
[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
